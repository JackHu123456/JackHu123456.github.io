<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 词典笔 · 独立词库（测验带确认）</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(145deg, #f0f4fa 0%, #e6ecf5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .app-container {
            width: 100%;
            max-width: 800px;
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            box-shadow: 0 25px 50px -10px rgba(0,20,40,0.25);
            padding: 28px 24px 36px;
            border: 1px solid rgba(255,255,255,0.7);
        }
        h1 {
            font-size: 2rem;
            font-weight: 600;
            color: #1a2e45;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        h1 span {
            background: #2b3f5c;
            color: white;
            font-size: 0.9rem;
            padding: 4px 14px;
            border-radius: 60px;
            margin-left: 12px;
        }
        .pdf-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 0 0 20px 8px;
            justify-content: center;
        }
        .pdf-btn {
            background: rgba(255,255,255,0.7);
            border: 1px solid rgba(255,255,255,0.9);
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 550;
            font-size: 0.95rem;
            color: #1e3349;
            cursor: pointer;
            transition: 0.15s;
            backdrop-filter: blur(4px);
        }
        .pdf-btn.active {
            background: #1e3349;
            color: white;
            border-color: #3f5a7a;
            box-shadow: 0 10px 15px -6px #1e3349aa;
        }
        .mode-tabs {
            display: flex;
            gap: 12px;
            margin: 0 0 20px 8px;
            justify-content: center;
        }
        .mode-btn {
            background: rgba(255,255,255,0.5);
            border: 1px solid rgba(255,255,255,0.7);
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: 600;
            color: #1e3349;
            cursor: pointer;
        }
        .mode-btn.active {
            background: #1e3349;
            color: white;
            border-color: #3f5a7a;
        }
        .card {
            background: white;
            border-radius: 40px;
            padding: 32px 24px;
            box-shadow: 0 15px 30px -12px rgba(0,20,40,0.2);
            margin-bottom: 28px;
            border: 1px solid rgba(255,255,255,0.8);
        }
        .word-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }
        .word-display {
            font-size: 4rem;
            font-weight: 700;
            color: #0b1c2e;
            line-height: 1.2;
            word-break: break-word;
            letter-spacing: -0.02em;
        }
        .speak-btn {
            background: #eef3fc;
            border: none;
            border-radius: 60px;
            width: 64px;
            height: 64px;
            font-size: 2rem;
            cursor: pointer;
            box-shadow: 0 8px 16px rgba(0,20,40,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1e3349;
            border: 1px solid rgba(255,255,255,0.8);
        }
        .speak-btn:hover {
            background: #dae6f8;
            transform: scale(1.05);
        }
        .favorite-btn {
            background: #fff0e6;
            border: none;
            border-radius: 60px;
            width: 64px;
            height: 64px;
            font-size: 2rem;
            cursor: pointer;
            box-shadow: 0 8px 16px rgba(0,20,40,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #c44f4f;
            border: 1px solid rgba(255,255,255,0.8);
        }
        .favorite-btn.active {
            background: #fce4e4;
            color: #b33;
        }
        .definition-area {
            background: #f2f6fd;
            border-radius: 28px;
            padding: 24px 22px;
            font-size: 1.3rem;
            line-height: 1.5;
            color: #1a2e45;
            border: 1px solid #d9e2f0;
            max-height: 260px;
            overflow-y: auto;
            font-family: 'Georgia', serif;
        }
        .quiz-question {
            background: #f2f6fd;
            border-radius: 28px;
            padding: 24px 22px;
            font-size: 1.5rem;
            line-height: 1.5;
            color: #1a2e45;
            border: 1px solid #d9e2f0;
            margin-bottom: 16px;
            text-align: center;
            font-weight: 500;
        }
        .quiz-feedback {
            background: #e9effa;
            border-radius: 20px;
            padding: 12px 20px;
            margin: 16px 0;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 500;
            color: #1e3349;
            border: 1px solid #bdc9db;
        }
        .quiz-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 24px;
        }
        .quiz-option {
            background: #eef3fc;
            border: 2px solid #bdc9db;
            border-radius: 30px;
            padding: 18px;
            font-size: 1.2rem;
            text-align: center;
            cursor: pointer;
            transition: 0.1s;
        }
        .quiz-option:hover {
            background: #d9e3f0;
            transform: translateY(-2px);
        }
        .quiz-option.selected {
            background: #c9daf2;
            border-color: #1e3349;
            font-weight: 600;
        }
        .quiz-option.correct {
            background: #b8e0b8;
            border-color: #2c6e2c;
        }
        .quiz-option.wrong {
            background: #f4baba;
            border-color: #a13d3d;
        }
        .button-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 28px 0 20px;
        }
        .btn {
            background: white;
            border: none;
            border-radius: 60px;
            padding: 14px 26px;
            font-size: 1.1rem;
            font-weight: 550;
            color: #1e3349;
            cursor: pointer;
            box-shadow: 0 6px 14px rgba(0,15,30,0.1);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(255,255,255,0.7);
            flex: 1 0 auto;
            min-width: 130px;
        }
        .btn-primary {
            background: #1e3349;
            color: white;
            box-shadow: 0 10px 18px -8px #1e3349aa;
        }
        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .progress-indicator {
            text-align: center;
            font-weight: 500;
            color: #3f5a7a;
            background: rgba(255,255,255,0.7);
            padding: 12px 18px;
            border-radius: 60px;
            width: fit-content;
            margin: 12px auto 0;
            font-size: 1.05rem;
        }
        .footer-note {
            text-align: center;
            color: #5b6f8a;
            margin-top: 22px;
            font-size: 0.9rem;
        }
        .hidden {
            display: none !important;
        }
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.5rem;
            color: #1e3349;
        }
    </style>
</head>
<body>
<div class="app-container" id="app">
    <h1>✦ 单词本·独立词库 <span id="pdf-badge">加载中...</span></h1>

    <!-- 加载提示 -->
    <div id="loading" class="loading">⏳ 正在加载词库，请稍候...</div>

    <!-- 主要界面（初始隐藏） -->
    <div id="mainUI" class="hidden">
        <!-- PDF 切换按钮组 -->
        <div class="pdf-tabs" id="pdf-tabs-container"></div>

        <!-- 模式切换：学习 / 测验 / 收藏 -->
        <div class="mode-tabs">
            <button class="mode-btn active" data-mode="learn">📖 学习</button>
            <button class="mode-btn" data-mode="quiz">🧪 测验</button>
            <button class="mode-btn" data-mode="favorite">📋 收藏夹</button>
        </div>

        <!-- 卡片区域 -->
        <div class="card" id="flashcard">
            <!-- 学习/收藏模式头部（单词、发音、收藏） -->
            <div id="wordHeader">
                <div class="word-header">
                    <div class="word-display" id="wordDisplay">---</div>
                    <button class="speak-btn" id="speakBtn" title="朗读">🔊</button>
                    <button class="favorite-btn" id="favoriteBtn" title="收藏">❤️</button>
                </div>
                <!-- 学习/收藏模式释义区 -->
                <div class="definition-area" id="definitionDisplay">
                    <span class="def-placeholder">✨ 点击卡片显示释义</span>
                </div>
            </div>

            <!-- 测验模式区域（默认隐藏） -->
            <div id="quizArea" class="hidden">
                <div class="quiz-question" id="quizQuestion"></div>
                <!-- 反馈信息区域 -->
                <div class="quiz-feedback" id="quizFeedback"></div>
                <div class="quiz-options" id="quizOptionsContainer"></div>
            </div>
        </div>

        <!-- 学习/收藏模式控制按钮 -->
        <div id="learnControls" class="button-group">
            <button class="btn" id="prevBtn"><span class="icon">←</span> 上一个</button>
            <button class="btn btn-primary" id="revealBtn">🔍 显示释义</button>
            <button class="btn" id="nextBtn">下一个 <span class="icon">→</span></button>
        </div>
        <div id="extraControls" class="button-group">
            <button class="btn" id="randomBtn">🎲 随机单词</button>
        </div>

        <!-- 测验模式控制按钮（初始隐藏） -->
        <div id="quizControls" class="button-group hidden">
            <button class="btn" id="confirmAnswerBtn" disabled>✅ 确认答案</button>
            <button class="btn" id="showAnswerBtn">🔍 显示答案</button>
            <button class="btn" id="nextQuizBtn">▶️ 下一题</button>
        </div>

        <div class="progress-indicator" id="progress">
            <span id="currentIndex">0</span> / <span id="totalCount">0</span>
        </div>
    </div>
    <div class="footer-note">⚡ 测验模式根据中文选英文 · 点击❤️收藏</div>
</div>

<script>
    (function() {
        const app = document.getElementById('app');
        const loadingDiv = document.getElementById('loading');
        const mainUI = document.getElementById('mainUI');

        // 全局数据
        let words = [];
        let pdfRanges = [];
        let favorites = new Set();          // 存储收藏的全局索引

        // 状态变量
        let activePdfIndex = 0;
        let activeWords = [];                // 当前显示的单词子集（根据分册或收藏）
        let currentIdx = 0;
        let definitionVisible = false;
        let currentMode = 'learn';            // 'learn', 'quiz', 'favorite'

        // 测验专用
        let quizQuestionWord = null;           // 当前测验的正确单词对象
        let quizOptions = [];                  // 四个选项的单词文本
        let correctAnswerWord = '';            // 正确答案的文本
        let selectedOption = null;              // 用户当前选中的选项文本
        let quizAnswered = false;               // 是否已确认答案（锁定选项）

        // DOM 元素
        const pdfTabs = document.getElementById('pdf-tabs-container');
        const pdfBadge = document.getElementById('pdf-badge');
        const wordHeader = document.getElementById('wordHeader');
        const wordDisplay = document.getElementById('wordDisplay');
        const definitionDisplay = document.getElementById('definitionDisplay');
        const quizArea = document.getElementById('quizArea');
        const quizQuestion = document.getElementById('quizQuestion');
        const quizFeedback = document.getElementById('quizFeedback');
        const quizOptionsContainer = document.getElementById('quizOptionsContainer');
        const speakBtn = document.getElementById('speakBtn');
        const favoriteBtn = document.getElementById('favoriteBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const randomBtn = document.getElementById('randomBtn');
        const revealBtn = document.getElementById('revealBtn');
        const learnControls = document.getElementById('learnControls');
        const extraControls = document.getElementById('extraControls');
        const quizControls = document.getElementById('quizControls');
        const confirmAnswerBtn = document.getElementById('confirmAnswerBtn');
        const showAnswerBtn = document.getElementById('showAnswerBtn');
        const nextQuizBtn = document.getElementById('nextQuizBtn');
        const currentSpan = document.getElementById('currentIndex');
        const totalSpan = document.getElementById('totalCount');
        const modeBtns = document.querySelectorAll('.mode-btn');

        // 从 localStorage 加载收藏
        function loadFavorites() {
            try {
                const saved = localStorage.getItem('wordFavorites');
                if (saved) {
                    favorites = new Set(JSON.parse(saved));
                } else {
                    favorites.clear();
                }
            } catch (e) {
                favorites.clear();
            }
        }

        function saveFavorites() {
            localStorage.setItem('wordFavorites', JSON.stringify(Array.from(favorites)));
        }

        // 切换当前激活的单词集（根据模式与分册）
        function updateActiveWords() {
            if (currentMode === 'favorite') {
                // 收藏夹模式：只显示收藏的单词，按照全局索引排序
                const favArray = Array.from(favorites).sort((a,b) => a - b);
                activeWords = favArray.map(idx => words[idx]);
            } else {
                // 学习/测验模式：当前分册的单词
                activeWords = words.slice(pdfRanges[activePdfIndex].start, pdfRanges[activePdfIndex].end);
            }
            if (activeWords.length === 0) {
                wordDisplay.textContent = '暂无收藏';
                definitionDisplay.innerHTML = '<span class="def-placeholder">快去添加一些单词吧 ❤️</span>';
                currentSpan.textContent = '0';
                totalSpan.textContent = '0';
                return;
            }
            // 确保 currentIdx 不越界
            if (currentIdx >= activeWords.length) currentIdx = 0;
            updateDisplay();
        }

        // 更新显示（单词、释义、收藏按钮状态）
        function updateDisplay() {
            if (activeWords.length === 0) {
                if (currentMode === 'favorite') {
                    wordDisplay.textContent = '暂无收藏';
                    definitionDisplay.innerHTML = '<span class="def-placeholder">快去添加一些单词吧 ❤️</span>';
                }
                return;
            }
            const wordObj = activeWords[currentIdx];
            const globalIdx = words.findIndex(w => w.word === wordObj.word && w.definition === wordObj.definition);
            wordDisplay.textContent = wordObj.word;
            if (definitionVisible) {
                definitionDisplay.textContent = wordObj.definition;
            } else {
                definitionDisplay.innerHTML = '<span class="def-placeholder">✨ 点击卡片显示释义</span>';
            }
            // 更新收藏按钮样式
            if (favorites.has(globalIdx)) {
                favoriteBtn.classList.add('active');
            } else {
                favoriteBtn.classList.remove('active');
            }
            // 更新进度
            currentSpan.textContent = currentIdx + 1;
            totalSpan.textContent = activeWords.length;
            pdfBadge.textContent = currentMode === 'favorite' ? '收藏夹' : pdfRanges[activePdfIndex].name;
        }

        // 切换模式
        function setMode(mode) {
            currentMode = mode;
            modeBtns.forEach(btn => {
                if (btn.dataset.mode === mode) btn.classList.add('active');
                else btn.classList.remove('active');
            });

            if (mode === 'quiz') {
                // 测验模式：隐藏学习相关控件，显示测验相关
                learnControls.classList.add('hidden');
                extraControls.classList.add('hidden');
                quizControls.classList.remove('hidden');
                wordHeader.classList.add('hidden');      // 隐藏单词头部和释义区
                quizArea.classList.remove('hidden');     // 显示测验区域
                prepareQuiz();
            } else {
                // 学习或收藏模式：显示学习控件，隐藏测验控件
                learnControls.classList.remove('hidden');
                extraControls.classList.remove('hidden');
                quizControls.classList.add('hidden');
                wordHeader.classList.remove('hidden');   // 显示单词头部
                quizArea.classList.add('hidden');        // 隐藏测验区域
                definitionVisible = false;
                updateActiveWords(); // 重新加载当前分册或收藏
            }
        }

        // 准备测验：从当前 activeWords 中随机选一个作为题目
        function prepareQuiz() {
            if (activeWords.length === 0) {
                quizQuestion.textContent = '没有可测验的单词';
                quizOptionsContainer.innerHTML = '';
                quizFeedback.textContent = '';
                return;
            }
            // 随机选择一个单词作为正确单词
            const correctIdx = Math.floor(Math.random() * activeWords.length);
            const correctWord = activeWords[correctIdx];
            quizQuestionWord = correctWord;
            correctAnswerWord = correctWord.word;

            // 显示中文释义作为题目
            quizQuestion.textContent = `📌 ${correctWord.definition}`;
            quizFeedback.textContent = ''; // 清空反馈

            // 生成四个选项（英文单词），包括正确单词
            let options = [correctWord.word];

            // 从所有单词中随机抽取三个不重复的干扰项（不能与正确单词相同）
            const otherWords = words.filter(w => w.word !== correctWord.word);
            // 打乱后取前3个，如果不足则重复利用（但基本不会，单词数量足够）
            const shuffled = otherWords.sort(() => 0.5 - Math.random());
            for (let i = 0; i < 3; i++) {
                if (shuffled[i]) {
                    options.push(shuffled[i].word);
                } else {
                    // 保底：加一个占位符
                    options.push('(none)');
                }
            }

            // 打乱选项顺序
            for (let i = options.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [options[i], options[j]] = [options[j], options[i]];
            }

            quizOptions = options;
            selectedOption = null;
            quizAnswered = false;
            confirmAnswerBtn.disabled = true; // 未选择答案时禁用确认按钮
            renderQuiz();
        }

        function renderQuiz() {
            quizOptionsContainer.innerHTML = '';
            quizOptions.forEach((optWord) => {
                const btn = document.createElement('div');
                btn.className = 'quiz-option';
                btn.textContent = optWord;
                btn.dataset.word = optWord;
                btn.addEventListener('click', () => {
                    if (quizAnswered) return; // 已确认答案，不能再选
                    // 移除其他选项的 selected 类
                    document.querySelectorAll('.quiz-option').forEach(opt => opt.classList.remove('selected'));
                    btn.classList.add('selected');
                    selectedOption = optWord;
                    confirmAnswerBtn.disabled = false; // 启用确认按钮
                });
                quizOptionsContainer.appendChild(btn);
            });
        }

        // 确认答案
        function confirmAnswer() {
            if (!selectedOption || quizAnswered) return;
            quizAnswered = true;
            confirmAnswerBtn.disabled = true;

            const allOpts = document.querySelectorAll('.quiz-option');
            // 先移除所有 selected
            allOpts.forEach(opt => opt.classList.remove('selected'));

            // 高亮正确选项
            allOpts.forEach(opt => {
                if (opt.dataset.word === correctAnswerWord) {
                    opt.classList.add('correct');
                } else if (opt.dataset.word === selectedOption && selectedOption !== correctAnswerWord) {
                    opt.classList.add('wrong');
                }
            });

            // 显示反馈信息
            if (selectedOption === correctAnswerWord) {
                quizFeedback.textContent = '✅ 正确！';
            } else {
                quizFeedback.textContent = `❌ 错误，正确答案是 “${correctAnswerWord}”`;
            }
        }

        // 显示答案（直接高亮正确选项，不经过确认）
        function showQuizAnswer() {
            if (quizAnswered) return; // 如果已经确认，不能再显示答案（但可允许再次显示？允许吧）
            quizAnswered = true;
            confirmAnswerBtn.disabled = true;

            const allOpts = document.querySelectorAll('.quiz-option');
            allOpts.forEach(opt => {
                opt.classList.remove('selected', 'wrong');
                if (opt.dataset.word === correctAnswerWord) {
                    opt.classList.add('correct');
                }
            });

            quizFeedback.textContent = `🔍 正确答案是 “${correctAnswerWord}”`;
        }

        // 下一题
        function nextQuiz() {
            prepareQuiz();
        }

        // 收藏/取消收藏
        function toggleFavorite() {
            if (activeWords.length === 0) return;
            const wordObj = activeWords[currentIdx];
            const globalIdx = words.findIndex(w => w.word === wordObj.word && w.definition === wordObj.definition);
            if (favorites.has(globalIdx)) {
                favorites.delete(globalIdx);
            } else {
                favorites.add(globalIdx);
            }
            saveFavorites();
            favoriteBtn.classList.toggle('active');
        }

        // 朗读
        function speakCurrentWord() {
            if (activeWords.length === 0) return;
            const word = activeWords[currentIdx].word;
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(word);
                utterance.lang = 'en-US';
                utterance.rate = 0.9;
                window.speechSynthesis.speak(utterance);
            } else {
                alert('浏览器不支持语音朗读');
            }
        }

        // 加载数据
        async function loadData() {
            try {
                const response = await fetch('data.json');
                if (!response.ok) throw new Error('无法加载 data.json');
                const data = await response.json();
                words = data.words;
                pdfRanges = data.pdfRanges;
                // 初始化收藏
                loadFavorites();
                // 设置默认分册
                activePdfIndex = 0;
                activeWords = words.slice(pdfRanges[0].start, pdfRanges[0].end);
                currentIdx = 0;
                definitionVisible = false;
                // 渲染分册按钮
                renderPdfButtons();
                // 显示主界面
                loadingDiv.classList.add('hidden');
                mainUI.classList.remove('hidden');
                updateDisplay();
            } catch (error) {
                loadingDiv.innerHTML = `❌ 加载失败：${error.message}<br>请确保 data.json 文件存在且格式正确，并使用本地服务器访问。`;
            }
        }

        function renderPdfButtons() {
            pdfTabs.innerHTML = '';
            pdfRanges.forEach((range, idx) => {
                const btn = document.createElement('button');
                btn.className = `pdf-btn ${idx === activePdfIndex ? 'active' : ''}`;
                btn.textContent = range.name;
                btn.addEventListener('click', () => {
                    if (currentMode === 'favorite') {
                        // 收藏夹模式下，切换分册无效，可提示或忽略
                        return;
                    }
                    activePdfIndex = idx;
                    document.querySelectorAll('.pdf-btn').forEach((b, i) => {
                        if (i === activePdfIndex) b.classList.add('active');
                        else b.classList.remove('active');
                    });
                    updateActiveWords();
                });
                pdfTabs.appendChild(btn);
            });
        }

        // 事件绑定
        speakBtn.addEventListener('click', (e) => { e.stopPropagation(); speakCurrentWord(); });
        favoriteBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleFavorite(); });
        revealBtn.addEventListener('click', () => { definitionVisible = true; updateDisplay(); });
        prevBtn.addEventListener('click', () => { if (activeWords.length) { currentIdx = (currentIdx - 1 + activeWords.length) % activeWords.length; definitionVisible = false; updateDisplay(); } });
        nextBtn.addEventListener('click', () => { if (activeWords.length) { currentIdx = (currentIdx + 1) % activeWords.length; definitionVisible = false; updateDisplay(); } });
        randomBtn.addEventListener('click', () => { if (activeWords.length) { currentIdx = Math.floor(Math.random() * activeWords.length); definitionVisible = false; updateDisplay(); } });
        document.getElementById('flashcard').addEventListener('click', (e) => {
            // 只在学习/收藏模式下点击卡片显示释义
            if (currentMode !== 'quiz') {
                definitionVisible = true;
                updateDisplay();
            }
        });

        modeBtns.forEach(btn => {
            btn.addEventListener('click', () => setMode(btn.dataset.mode));
        });

        confirmAnswerBtn.addEventListener('click', confirmAnswer);
        showAnswerBtn.addEventListener('click', showQuizAnswer);
        nextQuizBtn.addEventListener('click', nextQuiz);

        // 启动加载
        loadData();
    })();
</script>
</body>
</html>
